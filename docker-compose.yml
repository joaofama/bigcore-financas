version: '3.8'

services:
  # Banco de Dados NoSQL (MongoDB)
  mongodb:
    image: mongo:latest
    container_name: financas-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MongoDbSettings__User}
      - MONGO_INITDB_ROOT_PASSWORD=${MongoDbSettings__Password}
      - MONGO_INITDB_DATABASE=${MongoDbSettings__DatabaseName}
    volumes:
      - mongodb_data:/data/db

  # Interface Visual para o MongoDB (Mongo Express)
  mongo-express:
    image: mongo-express:latest
    container_name: financas-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MongoDbSettings__User}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MongoDbSettings__Password}
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin
    depends_on:
      - mongodb

  # Cache e Performance (Redis)
  redis:
    image: redis:latest
    container_name: financas-redis
    restart: always
    ports:
      - "6379:6379"
    # Comando para iniciar o Redis exigindo a senha definida no .env
    command: redis-server --requirepass ${RedisSettings__Password}
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data: