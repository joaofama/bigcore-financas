name: financas

services:
  api:
    container_name: financas-api
    build:
      context: .
      dockerfile: src/Financas.API/Dockerfile
    restart: always
    ports:
      - "${App_ExternalPort}:${App_InternalPort}"
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:${App_InternalPort}
      - ASPNETCORE_HTTP_PORTS=${App_InternalPort}      
      - MongoDbSettings__Host=${MongoDbSettings__Host}
      - MongoDbSettings__Port=${MongoDbSettings__Port}
      - MongoDbSettings__User=${MongoDbSettings__User}
      - MongoDbSettings__Password=${MongoDbSettings__Password}
      - MongoDbSettings__DatabaseName=${MongoDbSettings__DatabaseName}      
      - RedisSettings__Host=${RedisSettings__Host}
      - RedisSettings__Port=${RedisSettings__Port}
      - RedisSettings__Password=${RedisSettings__Password}
      - JwtSettings__Secret=${JwtSettings__Secret}
      - JwtSettings__Issuer=${JwtSettings__Issuer}
      - JwtSettings__Audience=${JwtSettings__Audience}
      - JwtSettings__ExpirationInHours=${JwtSettings__ExpirationInHours} 
    depends_on:
      - mongo
      - redis

  ui:
    container_name: financas-ui
    build:
      context: ./ui
      args:
        - VITE_API_URL=${VITE_API_URL}
    # Adicionado environment para o Vite ler em tempo de execuĂ§ĂŁo (dev mode)
    environment:
      - VITE_API_URL=${VITE_API_URL}
    ports:
      - "${UI_ExternalPort}:${UI_InternalPort}"
    depends_on:
      - api

  mongo:
    image: mongo:latest
    container_name: financas-mongodb
    restart: always
    command: mongod --quiet --port ${MongoDbSettings__Port}
    ports:
      - "${MongoDbSettings__Port}:${MongoDbSettings__Port}"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MongoDbSettings__User}
      - MONGO_INITDB_ROOT_PASSWORD=${MongoDbSettings__Password}
      - MONGO_INITDB_DATABASE=${MongoDbSettings__DatabaseName}
    volumes:
      - mongodb_data:/data/db
      - ./db:/docker-entrypoint-initdb.d 

  redis:
    image: redis:latest
    container_name: financas-redis
    restart: always
    command: redis-server --port ${RedisSettings__Port} --requirepass ${RedisSettings__Password}
    ports:
      - "${RedisSettings__Port}:${RedisSettings__Port}"
    volumes:
      - redis_data:/data

  mongo-express:
    image: mongo-express:latest
    container_name: financas-mongo-express
    ports:
      - "${MongoExpress_ExternalPort}:${MongoExpress_InternalPort}"
    environment:
      - ME_CONFIG_MONGODB_SERVER=${MongoDbSettings__Host}
      - ME_CONFIG_MONGODB_PORT=${MongoDbSettings__Port}
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MongoDbSettings__User}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MongoDbSettings__Password}
    depends_on:
      - mongo

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: financas-redis-commander
    ports:
      - "${RedisCommander_ExternalPort}:${RedisCommander_InternalPort}"
    environment:
      - REDIS_HOSTS=local:${RedisSettings__Host}:${RedisSettings__Port}:0:${RedisSettings__Password}
    depends_on:
      - redis

volumes:
  mongodb_data:
  redis_data: