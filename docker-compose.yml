services:
  api:
    container_name: financas-api-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development      
      - MongoDbSettings__Host=mongo
      - MongoDbSettings__User=${MongoDbSettings__User}
      - MongoDbSettings__Password=${MongoDbSettings__Password}
      - MongoDbSettings__DatabaseName=${MongoDbSettings__DatabaseName}      
      - RedisSettings__Host=redis
      - RedisSettings__Password=${RedisSettings__Password}     
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:latest
    container_name: financas-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MongoDbSettings__User}
      - MONGO_INITDB_ROOT_PASSWORD=${MongoDbSettings__Password}
      - MONGO_INITDB_DATABASE=${MongoDbSettings__DatabaseName}
    volumes:
      - mongodb_data:/data/db
      - ./db:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:latest
    container_name: financas-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${RedisSettings__Password}
    volumes:
      - redis_data:/data

  mongo-express:
    image: mongo-express:latest
    container_name: financas-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MongoDbSettings__User}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MongoDbSettings__Password}
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_AUTH_DATABASE=admin
      - ME_CONFIG_BASICAUTH_USERNAME=${MongoDbSettings__User}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MongoDbSettings__Password}
    depends_on:
      - mongo

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: financas-redis-commander
    restart: always
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${RedisSettings__Password}
    ports:
      - "8082:8081"
    depends_on:
      - redis

volumes:
  mongodb_data:
  redis_data: